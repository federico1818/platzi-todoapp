<h1>Todo App</h1>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
        <input 
            type="text" 
            placeholder="New task..."
            formControlName="task"
        >

        <button class="button-icon" type="submit">></button>
</form>
<ul>
    <li class="task" [class.completed]="task.completed" *ngFor="let task of tasks(); index as i">
        <input class="checkbox" type="checkbox" [checked]="task.completed" (change)="toggleCompleted(i)">
        <div class="task-title">{{ task.title }}</div>
        <button class="button-icon" (click)="deleteTask(i)">x</button>
    </li>
</ul>
